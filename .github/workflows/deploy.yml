name: Build and push Derzhavnaya

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Сборка Tailwind CSS (обязательно ДО сборки Docker образа)
      - name: Build Tailwind CSS
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          ./tailwindcss-linux-x64 -i ./web/static/css/input.css -o ./web/static/css/style.css

      - name: Login to Zot
        uses: docker/login-action@v3
        with:
          registry: registry.trak.spb.ru
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Не забываем передать сгенерированный style.css в контекст сборки
          tags: |
            registry.trak.spb.ru/derzhavnaya/site:latest
            registry.trak.spb.ru/derzhavnaya/site:${{ github.sha }}