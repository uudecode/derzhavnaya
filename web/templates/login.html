{{define "content"}}
<div class="max-w-md mx-auto my-20 p-8 bg-white/60 rounded-3xl border border-church-gold/20 shadow-xl">
    <h2 class="text-2xl font-serif text-church-wine text-center mb-8">Вход в систему</h2>

    {{if .Error}}
    <div class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm rounded-r-xl">
        {{.Error}}
    </div>
    {{end}}

    <form action="/login" method="POST" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

        <div>
            <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Электронная почта</label>
            <input type="email" name="email" value="{{.Email}}" required class="w-full p-3 rounded-xl border border-church-gold/20 focus:outline-none focus:ring-2 focus:ring-church-wine/20">
        </div>

        <div>
            <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Пароль</label>
            <input type="password" name="password" required class="w-full p-3 rounded-xl border border-church-gold/20 focus:outline-none focus:ring-2 focus:ring-church-wine/20">
        </div>

        <button type="submit" class="w-full bg-church-wine text-white p-4 rounded-xl font-bold uppercase tracking-widest hover:bg-red-900 transition-all shadow-lg">
            Войти
        </button>
    </form>
</div>
{{end}}
